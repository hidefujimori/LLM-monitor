# Splunk index configuration for LLM Monitor
# Place this file in: $SPLUNK_HOME/etc/system/local/indexes.conf
# or in your app: $SPLUNK_HOME/etc/apps/llm_monitor/local/indexes.conf

[llm_monitor]
homePath   = $SPLUNK_DB/llm_monitor/db
coldPath   = $SPLUNK_DB/llm_monitor/colddb
thawedPath = $SPLUNK_DB/llm_monitor/thaweddb
maxDataSize = auto_high_volume
frozenTimePeriodInSecs = 2592000
